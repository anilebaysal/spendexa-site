<!doctype html>
<html lang="tr" data-language="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Sayfa bulunamadı">
  <title>Sayfa Bulunamadı · Spendexa</title>
  <script>
    try {
      const savedLanguage = localStorage.getItem("spendexa-language");
      if (savedLanguage === "en" || savedLanguage === "tr") {
        document.documentElement.dataset.language = savedLanguage;
        document.documentElement.lang = savedLanguage;
      }
    } catch {}
  </script>
  <link rel="stylesheet" href="/styles.css">
  <script src="/language.js" defer></script>
</head>
<body
  data-title-tr="Sayfa Bulunamadı · Spendexa"
  data-title-en="Page Not Found · Spendexa"
  data-description-tr="Sayfa bulunamadı"
  data-description-en="Page not found"
>
  <header class="wrap">
    <div class="header-row">
      <a class="brand" href="/" aria-label="Spendexa">spend<span>exa</span></a>
      <div class="language-switcher" role="group" aria-label="Language / Dil">
        <button class="language-button" type="button" data-language-button="tr" aria-pressed="true">TR</button>
        <button class="language-button" type="button" data-language-button="en" aria-pressed="false">EN</button>
      </div>
    </div>
  </header>
  <main class="wrap">
    <section class="card" data-lang="tr">
      <h1>Sayfa bulunamadı</h1>
      <p>Aradığınız sayfa mevcut değil.</p>
      <a class="button" href="/">Ana Sayfa</a>
    </section>
    <section class="card" data-lang="en" lang="en">
      <h1>Page not found</h1>
      <p>The page you are looking for does not exist.</p>
      <a class="button" href="/">Home</a>
    </section>
  </main>
  <footer class="wrap">© 2026 Spendexa</footer>
</body>
</html>
